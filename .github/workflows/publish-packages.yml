name: Publish Docker images

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arrhes/application

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images with docker compose
        env:
          ARRHES_VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker compose -f .workflows/.build/compose.yml build ci
          docker compose -f .workflows/.build/compose.yml build api website

      - name: Tag and push images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          IMAGES=("api" "website")
          MINOR="${VERSION%.*}"

          for img in "${IMAGES[@]}"; do
            SRC="arrhes-${img}:${VERSION}"
            DEST="${IMAGE_PREFIX}/${img}"

            docker tag "${SRC}" "${DEST}:v${VERSION}"
            docker tag "${SRC}" "${DEST}:v${MINOR}"
            docker tag "${SRC}" "${DEST}:sha-${SHA::7}"

            docker push "${DEST}:v${VERSION}"
            docker push "${DEST}:v${MINOR}"
            docker push "${DEST}:sha-${SHA::7}"
          done
